name: build runner ami

on:
  workflow_dispatch:
    inputs:
      runner_version:
        description: "GitHub Actions runner version"
        default: "2.332.0"
        required: true
      go_version:
        description: "Go version to pre-install"
        default: "1.23.6"
        required: false
      node_major_version:
        description: "Node.js major version (LTS) to pre-install"
        default: "22"
        required: false
      jit_runners_version:
        description: "jit-runners project version (auto-detected from git if empty)"
        default: ""
        required: false
      extra_script:
        description: "Path to extra setup script (relative to infra/packer/)"
        default: ""
        required: false
      distribute:
        description: "Copy AMI to all distribution regions (US, EU, SA)"
        type: boolean
        default: true
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - "infra/packer/**"

permissions:
  contents: read
  id-token: write

env:
  AMI_DISTRIBUTION_REGIONS: >-
    us-east-1,us-west-1,us-west-2,eu-west-1,eu-west-2,eu-west-3,eu-central-1,eu-north-1,sa-east-1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine jit-runners version
        id: version
        run: |
          # Use manual input if provided, otherwise auto-detect
          if [ -n "${{ inputs.jit_runners_version }}" ]; then
            VERSION="${{ inputs.jit_runners_version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "jit-runners version: ${VERSION}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.AMI_BUILD_ROLE_ARN }}
          aws-region: us-east-2

      - name: Setup Packer
        uses: hashicorp/setup-packer@main

      - name: Packer init
        working-directory: infra/packer
        run: packer init .

      - name: Packer validate
        working-directory: infra/packer
        run: packer validate -var "runner_version=${{ inputs.runner_version || '2.332.0' }}" .

      - name: Disable block public access for AMIs
        if: github.event_name != 'pull_request' && (inputs.distribute == true || inputs.distribute == '')
        run: |
          echo "Disabling block public access in source region..."
          aws ec2 disable-image-block-public-access --region us-east-2 || true
          IFS=',' read -ra REGIONS <<< "${{ env.AMI_DISTRIBUTION_REGIONS }}"
          for region in "${REGIONS[@]}"; do
            echo "Disabling block public access in ${region}..."
            aws ec2 disable-image-block-public-access --region "${region}" || true
          done

      - name: Packer build
        working-directory: infra/packer
        run: |
          RUNNER_VERSION="${{ inputs.runner_version || '2.332.0' }}"
          GO_VERSION="${{ inputs.go_version || '1.23.6' }}"
          NODE_MAJOR="${{ inputs.node_major_version || '22' }}"
          JIT_VERSION="${{ steps.version.outputs.version }}"

          ARGS="-var runner_version=${RUNNER_VERSION}"
          ARGS="${ARGS} -var go_version=${GO_VERSION}"
          ARGS="${ARGS} -var node_major_version=${NODE_MAJOR}"
          ARGS="${ARGS} -var jit_runners_version=${JIT_VERSION}"

          # PR builds: private AMI, no distribution, distinct prefix
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ARGS="${ARGS} -var ami_groups=[]"
            ARGS="${ARGS} -var ami_name_prefix=jit-runner-pr"
          else
            DISTRIBUTE="${{ inputs.distribute || 'true' }}"
            if [ "${DISTRIBUTE}" = "true" ]; then
              ARGS="${ARGS} -var ami_regions=[\"us-east-1\",\"us-west-1\",\"us-west-2\",\"eu-west-1\",\"eu-west-2\",\"eu-west-3\",\"eu-central-1\",\"eu-north-1\",\"sa-east-1\"]"
            fi
          fi

          if [ -n "${{ inputs.extra_script }}" ]; then
            ARGS="${ARGS} -var extra_script=${{ inputs.extra_script }}"
          fi

          packer build ${ARGS} .

      - name: Extract AMI ID and summary
        working-directory: infra/packer
        run: |
          AMI_ID=$(jq -r '.builds[-1].artifact_id' manifest.json | cut -d: -f2)
          RUNNER_VERSION="${{ inputs.runner_version || '2.332.0' }}"
          JIT_VERSION="${{ steps.version.outputs.version }}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "## PR Test AMI Build" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## AMI Build Complete" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ----- | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| AMI ID (source) | \`${AMI_ID}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| jit-runners Version | ${JIT_VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Runner Version | ${RUNNER_VERSION} |" >> "$GITHUB_STEP_SUMMARY"

          GO_VERSION="${{ inputs.go_version || '1.23.6' }}"
          NODE_MAJOR="${{ inputs.node_major_version || '22' }}"
          echo "| Go Version | ${GO_VERSION} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Node.js | ${NODE_MAJOR}.x LTS |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Source Region | us-east-2 |" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "| Distributed To | _(none — PR test build)_ |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "This AMI will be cleaned up after the build." >> "$GITHUB_STEP_SUMMARY"
          else
            DISTRIBUTE="${{ inputs.distribute || 'true' }}"
            if [ "${DISTRIBUTE}" = "true" ]; then
              echo "| Distributed To | us-east-1, us-west-1, us-west-2, eu-west-1, eu-west-2, eu-west-3, eu-central-1, eu-north-1, sa-east-1 |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| Distributed To | _(none — source region only)_ |" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Use this AMI as \`DefaultAMI\` in CloudFormation or \`default_ami\` in Terraform." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Cleanup PR test AMI
        if: always() && github.event_name == 'pull_request'
        working-directory: infra/packer
        run: |
          if [ ! -f manifest.json ]; then
            echo "No manifest.json found — Packer did not produce an AMI. Skipping cleanup."
            exit 0
          fi

          AMI_ID=$(jq -r '.builds[-1].artifact_id' manifest.json | cut -d: -f2)
          echo "Cleaning up PR test AMI ${AMI_ID}..."

          # Get snapshot IDs before deregistering
          SNAPSHOT_IDS=$(aws ec2 describe-images --image-ids "${AMI_ID}" --region us-east-2 \
            --query 'Images[0].BlockDeviceMappings[].Ebs.SnapshotId' --output text) || true

          echo "Deregistering AMI ${AMI_ID}..."
          aws ec2 deregister-image --image-id "${AMI_ID}" --region us-east-2

          for snap in ${SNAPSHOT_IDS}; do
            echo "Deleting snapshot ${snap}..."
            aws ec2 delete-snapshot --snapshot-id "${snap}" --region us-east-2 || true
          done

          echo "PR test AMI cleaned up."
